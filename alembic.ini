# ╔══════════════════════════════════════════════════════════╗
# ║  Alembic — конфигурация миграций базы данных            ║
# ╚══════════════════════════════════════════════════════════╝

[alembic]
# Путь до папки с миграциями
script_location = alembic

# Шаблон имени файла миграции
# %(year)d %(month).2d %(day).2d %(hour).2d %(minute).2d %(second).2d — дата
# %(rev)s — короткий хэш ревизии
# %(slug)s — slug из сообщения миграции
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# URL подключения к БД — берётся из .env через env.py
# Не прописывай сюда напрямую — используй переменную окружения DATABASE_URL
sqlalchemy.url = postgresql+asyncpg://jobradar:secret@localhost:5432/jobradar

# Часовой пояс для временных меток в миграциях
timezone = UTC

# Длина строки в сгенерированных файлах миграций
max_identifier_length = 63


# ── Логирование ───────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S